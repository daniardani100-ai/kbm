<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Absensi</title>
  <link rel="stylesheet"
        href="assets/css/style.css">
</head>
<body>

<div class="login-box">

  <h2>Login Absensi</h2>

  <form id="loginForm">

    <input
      type="text"
      id="username"
      placeholder="Username"
      required
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

  <p id="msg"></p>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>

<script>

document
.getElementById("loginForm")
.addEventListener(
  "submit",
  async function(e){

    e.preventDefault();

    const username =
      document.getElementById("username").value;

    const password =
      document.getElementById("password").value;

    const res = await apiPost({
      action: "login",
      username,
      password
    });

    const msg =
      document.getElementById("msg");

    if (!res.success) {
      msg.innerHTML = res.message;
      return;
    }

    setSession(res.data);

    if (res.data.role === "admin") {
      location.href =
        "admin/dashboard.html";
    }
    else {
      location.href =
        "tim/dashboard.html";
    }
  }
);

</script>

</body>
</html>
